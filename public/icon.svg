<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#111"/>
  <g transform="translate(256,280)" fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Car body -->
    <path d="M-160,20 L-140,-40 L-80,-80 L80,-80 L140,-20 L160,20 L160,40 L-160,40 Z" fill="#222" stroke="#fff"/>
    <!-- Roof -->
    <path d="M-60,-80 L-30,-130 L70,-130 L100,-80" fill="#1a1a1a"/>
    <!-- Windows -->
    <path d="M-50,-78 L-25,-122 L20,-122 L20,-78" fill="#333" stroke="#555" stroke-width="8"/>
    <path d="M30,-78 L30,-122 L65,-122 L90,-78" fill="#333" stroke="#555" stroke-width="8"/>
    <!-- Wheels -->
    <circle cx="-100" cy="50" r="36" fill="#111" stroke="#fff" stroke-width="16"/>
    <circle cx="-100" cy="50" r="12" fill="#444"/>
    <circle cx="100" cy="50" r="36" fill="#111" stroke="#fff" stroke-width="16"/>
    <circle cx="100" cy="50" r="12" fill="#444"/>
    <!-- Headlight -->
    <rect x="145" y="-10" width="18" height="16" rx="4" fill="#ffd700"/>
    <!-- Taillight -->
    <rect x="-163" y="-10" width="12" height="16" rx="4" fill="#ff3333"/>
  </g>
  <!-- "G" letter -->
  <text x="256" y="160" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="100" font-weight="700" fill="#fff" opacity="0.15">G</text>
</svg>
